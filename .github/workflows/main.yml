name: Video Converter Pro
on:
  workflow_dispatch:

jobs:
  download_and_convert:
    runs-on: ubuntu-latest
    steps:
      # 1. تثبيت الأداة باستخدام المشروع الذي وجدته
      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          with-ffmpeg: true # يقوم بتثبيت FFmpeg تلقائياً كما طلبت
          
      # 2. عملية التحميل والتحويل (أضفت أوامر لمنع الحظر)
      - name: Run yt-dlp
        run: |
          yt-dlp -f "bv*[height<=1080]+ba/b" \
          --download-sections "*00:00:00-01:00:00" \
          --merge-output-format mp4 \
          --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/119.0.0.0 Safari/537.36" \
          -o "fireplace_video.mp4" \
          "https://www.youtube.com/watch?v=g6Ye4xwXyAw"

      # 3. الرفع ليعطيك رابط تحميل مباشر
      - name: Upload to Transfer.sh
        run: |
          echo "--- جاري الرفع... انتظر الرابط ---"
          URL=$(curl --upload-file ./fireplace_video.mp4 https://transfer.sh/fireplace_video.mp4)
          echo "****************************************"
          echo "رابط التحميل الخاص بك: $URL"
          echo "****************************************"
